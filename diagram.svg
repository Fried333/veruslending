<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1700" font-family="system-ui, -apple-system, sans-serif">
  <style>
    .title { font-size: 28px; font-weight: 700; fill: #1a1a1a; }
    .subtitle { font-size: 14px; fill: #555; font-style: italic; }
    .phase-title { font-size: 22px; font-weight: 700; fill: #1a1a1a; }
    .phase-sub { font-size: 14px; fill: #555; font-style: italic; }
    .lane-label { font-size: 16px; font-weight: 700; }
    .lane-borrower { fill: #2563eb; }
    .lane-chain { fill: #6b7280; }
    .lane-lender { fill: #059669; }
    .step-num { font-size: 18px; font-weight: 700; fill: #fff; }
    .step-text-bold { font-size: 14px; font-weight: 700; fill: #1a1a1a; }
    .step-text { font-size: 13px; fill: #1a1a1a; }
    .small { font-size: 11px; fill: #555; }
    .tx-label { font-size: 13px; font-weight: 700; fill: #fff; }
    .tx-detail { font-size: 11px; fill: #1a1a1a; }
    .arrow-label { font-size: 11px; fill: #444; }
    .key-text { font-size: 13px; fill: #333; }
    .note { font-size: 12px; fill: #666; font-style: italic; }
  </style>

  <defs>
    <marker id="arrow-blue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#059669"/>
    </marker>
    <marker id="arrow-gray" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- Title -->
  <rect x="0" y="0" width="1400" height="80" fill="#f8fafc"/>
  <text x="700" y="38" text-anchor="middle" class="title">VerusLending — Borrower-First Self-Settling Loan</text>
  <text x="700" y="62" text-anchor="middle" class="subtitle">Borrower commits + signs at request time; lender finalizes once and walks away; settlement is unilateral</text>

  <!-- Lane headers -->
  <rect x="0" y="80" width="1400" height="40" fill="#f1f5f9"/>
  <line x1="467" y1="80" x2="467" y2="120" stroke="#cbd5e1" stroke-width="2"/>
  <line x1="934" y1="80" x2="934" y2="120" stroke="#cbd5e1" stroke-width="2"/>
  <text x="233" y="105" text-anchor="middle" class="lane-label lane-borrower">BORROWER</text>
  <text x="700" y="105" text-anchor="middle" class="lane-label lane-chain">CHAIN  (multimap entries + txs)</text>
  <text x="1167" y="105" text-anchor="middle" class="lane-label lane-lender">LENDER</text>

  <!-- Vertical lane separators -->
  <line x1="467" y1="120" x2="467" y2="1620" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="934" y1="120" x2="934" y2="1620" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- ═══════════════════════════════════ -->
  <!-- PHASE 1: REQUEST -->
  <!-- ═══════════════════════════════════ -->
  <rect x="0" y="140" width="1400" height="40" fill="#dbeafe"/>
  <text x="20" y="167" class="phase-title">1. Borrower posts request</text>
  <text x="380" y="167" class="phase-sub">— commits a UTXO + pre-signs their half of Tx-A. ~1 click + ~0.0001 VRSC fee.</text>

  <!-- Step 1: borrower side actions -->
  <g>
    <circle cx="50" cy="220" r="20" fill="#2563eb"/>
    <text x="50" y="227" text-anchor="middle" class="step-num">1</text>
    <rect x="80" y="200" width="380" height="135" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
    <text x="100" y="220" class="step-text-bold">Auto-split clean collateral UTXO</text>
    <text x="100" y="237" class="small">sendcurrency 0.5001 VRSC → self (own R-address)</text>
    <text x="100" y="251" class="small">→ produces a fresh single-currency UTXO in mempool</text>
    <text x="100" y="271" class="step-text-bold">Build + sign Tx-A skeleton (this UTXO as input)</text>
    <text x="100" y="288" class="small">SIGHASH_ALL|ANYONECANPAY → covers all outputs,</text>
    <text x="100" y="302" class="small">allows lender to add their input later.</text>
    <text x="100" y="322" class="step-text-bold">Post loan.request to own VerusID</text>
  </g>

  <!-- loan.request artifact in chain lane -->
  <g>
    <rect x="510" y="200" width="380" height="135" rx="8" fill="#fff" stroke="#6b7280" stroke-width="2"/>
    <rect x="510" y="200" width="380" height="22" rx="8" fill="#6b7280"/>
    <text x="700" y="216" text-anchor="middle" class="tx-label">loan.request  (on borrower's iaddr)</text>
    <text x="525" y="238" class="tx-detail">• principal: 5 DAI / repay: 5.05 DAI / 30d</text>
    <text x="525" y="254" class="tx-detail">• collateral: 0.5 VRSC</text>
    <text x="525" y="270" class="tx-detail">• borrower_pubkey</text>
    <text x="525" y="286" class="tx-detail">• target_lender_iaddr</text>
    <text x="525" y="302" class="tx-detail">• borrower_input_signed_hex (Tx-A skeleton, signed)</text>
    <text x="525" y="318" class="small">stored as a contentmultimap entry under VDXF iPmnEr…</text>
  </g>

  <!-- ═══════════════════════════════════ -->
  <!-- PHASE 2: MATCH -->
  <!-- ═══════════════════════════════════ -->
  <rect x="0" y="365" width="1400" height="40" fill="#d1fae5"/>
  <text x="20" y="392" class="phase-title">2. Lender posts match</text>
  <text x="350" y="392" class="phase-sub">— pre-signs all 3 partials, then walks away forever.  ~1 click + ~0.0001 VRSC fee.</text>

  <!-- Step 2: lender side actions -->
  <g>
    <circle cx="1350" cy="445" r="20" fill="#059669"/>
    <text x="1350" y="452" text-anchor="middle" class="step-num">2</text>
    <rect x="940" y="425" width="380" height="220" rx="6" fill="#ecfdf5" stroke="#059669" stroke-width="1"/>
    <text x="960" y="445" class="step-text-bold">Auto-split clean principal UTXO</text>
    <text x="960" y="462" class="small">sendcurrency 5 DAI → self (own R-address)</text>
    <text x="960" y="476" class="small">→ produces single-currency UTXO in mempool</text>
    <text x="960" y="496" class="step-text-bold">Extend Tx-A: prepend lender's input</text>
    <text x="960" y="513" class="small">Sign with SIGHASH_SINGLE|ANYONECANPAY → output 0 (principal)</text>
    <text x="960" y="527" class="small">Both scriptSigs in → Tx-A txid is now stable.</text>
    <text x="960" y="547" class="step-text-bold">Pre-sign Tx-Repay vault-half</text>
    <text x="960" y="564" class="small">Input: future vault UTXO (Tx-A txid, vault_vout)</text>
    <text x="960" y="578" class="small">Output 0: 5.05 DAI → lender (sig-locked)</text>
    <text x="960" y="598" class="step-text-bold">Pre-sign Tx-B vault-half (with nLockTime=maturity)</text>
    <text x="960" y="615" class="small">Output 0: 0.5 VRSC → lender after maturity</text>
    <text x="960" y="635" class="step-text-bold">Post loan.match to own VerusID</text>
  </g>

  <!-- loan.match artifact in chain lane -->
  <g>
    <rect x="510" y="425" width="380" height="220" rx="8" fill="#fff" stroke="#6b7280" stroke-width="2"/>
    <rect x="510" y="425" width="380" height="22" rx="8" fill="#6b7280"/>
    <text x="700" y="441" text-anchor="middle" class="tx-label">loan.match  (on lender's iaddr)</text>
    <text x="525" y="463" class="tx-detail">• request_ref → borrower's loan.request</text>
    <text x="525" y="479" class="tx-detail">• vault_address (P2SH 2-of-2)</text>
    <text x="525" y="495" class="tx-detail">• vault_redeem_script</text>
    <text x="525" y="511" class="tx-detail">• lender_address</text>
    <text x="525" y="527" class="tx-detail">• tx_a_full  (Tx-A both inputs signed; broadcastable)</text>
    <text x="525" y="543" class="tx-detail">• tx_a_txid, vault_vout</text>
    <text x="525" y="559" class="tx-detail">• tx_repay_partial  (lender vault-half signed)</text>
    <text x="525" y="575" class="tx-detail">• tx_b_partial      (lender vault-half + nLockTime)</text>
    <text x="525" y="591" class="tx-detail">• maturity_block, expires_block</text>
    <text x="525" y="619" class="small">VDXF iBvgGu…  •  All settlement templates pre-signed at this</text>
    <text x="525" y="633" class="small">moment; lender goes offline forever from here on.</text>
  </g>

  <!-- ═══════════════════════════════════ -->
  <!-- PHASE 3: ACCEPT -->
  <!-- ═══════════════════════════════════ -->
  <rect x="0" y="675" width="1400" height="40" fill="#dbeafe"/>
  <text x="20" y="702" class="phase-title">3. Borrower accepts</text>
  <text x="320" y="702" class="phase-sub">— completes 2-of-2 sigs locally, broadcasts Tx-A, posts Tx-B back to lender via loan.status.  1 click.</text>

  <!-- Step 3: borrower accept -->
  <g>
    <circle cx="50" cy="755" r="20" fill="#2563eb"/>
    <text x="50" y="762" text-anchor="middle" class="step-num">3</text>
    <rect x="80" y="735" width="380" height="170" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
    <text x="100" y="755" class="step-text-bold">Read tx_a_full + 2 partials from lender's match</text>
    <text x="100" y="775" class="step-text-bold">Add borrower vault-half sigs</text>
    <text x="100" y="792" class="small">tx_repay_partial → 2-of-2 complete (kept locally)</text>
    <text x="100" y="806" class="small">tx_b_partial    → 2-of-2 complete (sent to lender)</text>
    <text x="100" y="826" class="step-text-bold">Broadcast Tx-A</text>
    <text x="100" y="843" class="small">Chain accepts (with both splits in mempool)</text>
    <text x="100" y="857" class="small">→ vault funded with collateral; principal lands at borrower</text>
    <text x="100" y="877" class="step-text-bold">Post loan.status to own VerusID</text>
    <text x="100" y="894" class="small">Carries tx_b_complete back to lender</text>
  </g>

  <!-- Tx-A on chain (visible to all) -->
  <g>
    <rect x="510" y="735" width="380" height="80" rx="8" fill="#fff" stroke="#6b7280" stroke-width="2"/>
    <rect x="510" y="735" width="380" height="22" rx="8" fill="#6b7280"/>
    <text x="700" y="751" text-anchor="middle" class="tx-label">Tx-A confirms — loan opens</text>
    <text x="525" y="775" class="tx-detail">5 DAI → borrower's R   (principal received)</text>
    <text x="525" y="791" class="tx-detail">0.5 VRSC → vault       (collateral locked, 2-of-2)</text>
    <text x="525" y="807" class="small">Both pre-signed splits + Tx-A propagate together.</text>
  </g>

  <!-- loan.status entry -->
  <g>
    <rect x="510" y="825" width="380" height="80" rx="8" fill="#fff" stroke="#6b7280" stroke-width="2"/>
    <rect x="510" y="825" width="380" height="22" rx="8" fill="#6b7280"/>
    <text x="700" y="841" text-anchor="middle" class="tx-label">loan.status  (on borrower's iaddr)</text>
    <text x="525" y="863" class="tx-detail">• loan_id = Tx-A txid</text>
    <text x="525" y="879" class="tx-detail">• tx_b_complete  (full Tx-B, ready to broadcast)</text>
    <text x="525" y="895" class="small">Lender reads this if they ever need to claim default.</text>
  </g>

  <!-- ═══════════════════════════════════ -->
  <!-- LOAN ACTIVE -->
  <!-- ═══════════════════════════════════ -->
  <rect x="0" y="935" width="1400" height="40" fill="#fef3c7"/>
  <text x="20" y="962" class="phase-title">— LOAN ACTIVE —</text>
  <text x="280" y="962" class="phase-sub">vault holds collateral; both parties have a fully-signed settlement template; both can be offline.</text>

  <!-- ═══════════════════════════════════ -->
  <!-- PHASE 4a: REPAY -->
  <!-- ═══════════════════════════════════ -->
  <rect x="0" y="995" width="1400" height="40" fill="#dbeafe"/>
  <text x="20" y="1022" class="phase-title">4a. Borrower repays  (happy path)</text>
  <text x="430" y="1022" class="phase-sub">— extends Tx-Repay with their repayment input + broadcasts.  1 click.</text>

  <g>
    <circle cx="50" cy="1075" r="20" fill="#2563eb"/>
    <text x="50" y="1082" text-anchor="middle" class="step-num">4a</text>
    <rect x="80" y="1055" width="380" height="135" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
    <text x="100" y="1075" class="step-text-bold">Auto-split clean repayment UTXO</text>
    <text x="100" y="1092" class="small">sendcurrency 5.05 DAI → self (split if bundled)</text>
    <text x="100" y="1112" class="step-text-bold">Extend stored Tx-Repay</text>
    <text x="100" y="1129" class="small">add input (5.05 DAI) + add output (0.5 VRSC → borrower)</text>
    <text x="100" y="1143" class="small">sign borrower's input → broadcast</text>
    <text x="100" y="1163" class="step-text-bold">Post loan.history (settled outcome attestation)</text>
  </g>

  <!-- Tx-Repay on chain -->
  <g>
    <rect x="510" y="1055" width="380" height="135" rx="8" fill="#fff" stroke="#6b7280" stroke-width="2"/>
    <rect x="510" y="1055" width="380" height="22" rx="8" fill="#6b7280"/>
    <text x="700" y="1071" text-anchor="middle" class="tx-label">Tx-Repay broadcast — loan settles</text>
    <text x="525" y="1093" class="tx-detail">Inputs:</text>
    <text x="540" y="1107" class="tx-detail">• vault UTXO (already 2-of-2 signed)</text>
    <text x="540" y="1121" class="tx-detail">• borrower's repayment input (5.05 DAI)</text>
    <text x="525" y="1141" class="tx-detail">Outputs:</text>
    <text x="540" y="1155" class="tx-detail">• 5.05 DAI → lender  (sig-locked, can't be redirected)</text>
    <text x="540" y="1169" class="tx-detail">• 0.5 VRSC → borrower (collateral returned)</text>
  </g>

  <!-- Lender's symmetric history attestation (auto, no click) -->
  <g>
    <circle cx="1350" cy="1110" r="20" fill="#059669"/>
    <text x="1350" y="1117" text-anchor="middle" class="step-num">4a'</text>
    <rect x="940" y="1090" width="380" height="100" rx="6" fill="#ecfdf5" stroke="#059669" stroke-width="1"/>
    <text x="960" y="1110" class="step-text-bold">Watcher detects Tx-Repay</text>
    <text x="960" y="1127" class="small">Polls every 30s: vault UTXO spent + my R received repay</text>
    <text x="960" y="1141" class="small">→ classify outcome from output structure</text>
    <text x="960" y="1161" class="step-text-bold">Post loan.history (lender attestation)</text>
    <text x="960" y="1178" class="small">role:lender, same loan_id — symmetric record</text>
  </g>

  <!-- ═══════════════════════════════════ -->
  <!-- PHASE 4b: DEFAULT CLAIM -->
  <!-- ═══════════════════════════════════ -->
  <rect x="0" y="1220" width="1400" height="40" fill="#fee2e2"/>
  <text x="20" y="1247" class="phase-title">4b. Lender claims default  (sad path)</text>
  <text x="450" y="1247" class="phase-sub">— after maturity, if borrower never broadcast Tx-Repay.  1 click.</text>

  <g>
    <circle cx="1350" cy="1300" r="20" fill="#059669"/>
    <text x="1350" y="1307" text-anchor="middle" class="step-num">4b</text>
    <rect x="940" y="1280" width="380" height="120" rx="6" fill="#ecfdf5" stroke="#059669" stroke-width="1"/>
    <text x="960" y="1300" class="step-text-bold">Read tx_b_complete from borrower's loan.status</text>
    <text x="960" y="1320" class="step-text-bold">Add fee input + sign + broadcast</text>
    <text x="960" y="1337" class="small">Chain rejects before nLockTime; accepts at maturity.</text>
    <text x="960" y="1351" class="small">Borrower never has to come online for this path.</text>
    <text x="960" y="1371" class="step-text-bold">Lender claims vault + posts loan.history</text>
    <text x="960" y="1388" class="small">role:lender outcome:defaulted (same click as broadcast).</text>
  </g>

  <!-- Tx-B on chain -->
  <g>
    <rect x="510" y="1280" width="380" height="120" rx="8" fill="#fff" stroke="#6b7280" stroke-width="2"/>
    <rect x="510" y="1280" width="380" height="22" rx="8" fill="#6b7280"/>
    <text x="700" y="1296" text-anchor="middle" class="tx-label">Tx-B broadcast — collateral seized</text>
    <text x="525" y="1318" class="tx-detail">Inputs:</text>
    <text x="540" y="1332" class="tx-detail">• vault UTXO (already 2-of-2 signed at match time)</text>
    <text x="540" y="1346" class="tx-detail">• lender's fee input (small VRSC)</text>
    <text x="525" y="1366" class="tx-detail">Outputs:</text>
    <text x="540" y="1380" class="tx-detail">• 0.5 VRSC → lender (sig-locked)</text>
    <text x="540" y="1394" class="tx-detail">• Tx-Repay becomes invalid (vault UTXO consumed)</text>
  </g>

  <!-- Borrower's symmetric default attestation (auto, no click) -->
  <g>
    <circle cx="50" cy="1300" r="20" fill="#2563eb"/>
    <text x="50" y="1307" text-anchor="middle" class="step-num">4b'</text>
    <rect x="80" y="1280" width="380" height="120" rx="6" fill="#eff6ff" stroke="#2563eb" stroke-width="1"/>
    <text x="100" y="1300" class="step-text-bold">Watcher detects vault drained by Tx-B</text>
    <text x="100" y="1317" class="small">Polls vault: spent by tx that's NOT my Tx-Repay</text>
    <text x="100" y="1331" class="small">→ vault output went to lender = defaulted</text>
    <text x="100" y="1351" class="step-text-bold">Post loan.history (borrower attestation)</text>
    <text x="100" y="1368" class="small">role:borrower outcome:defaulted, same loan_id</text>
    <text x="100" y="1388" class="small">— eventually-consistent record on both identities</text>
  </g>

  <!-- ═══════════════════════════════════ -->
  <!-- KEY -->
  <!-- ═══════════════════════════════════ -->
  <rect x="0" y="1430" width="1400" height="40" fill="#f1f5f9"/>
  <text x="20" y="1457" class="phase-title">Key properties</text>

  <g>
    <rect x="80" y="1490" width="430" height="100" rx="6" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="100" y="1510" class="step-text-bold lane-borrower">2 borrower clicks</text>
    <text x="100" y="1528" class="key-text">post request, click accept (settlement is broadcast)</text>
    <text x="100" y="1548" class="step-text-bold lane-borrower">+ 1 if happy path</text>
    <text x="100" y="1566" class="key-text">click repay (extends + broadcasts Tx-Repay)</text>
  </g>

  <g>
    <rect x="540" y="1490" width="430" height="100" rx="6" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="560" y="1510" class="step-text-bold lane-lender">1 lender click</text>
    <text x="560" y="1528" class="key-text">post match (signs all 3 partials, walks away)</text>
    <text x="560" y="1548" class="step-text-bold lane-lender">+ 1 only on default</text>
    <text x="560" y="1566" class="key-text">click claim collateral (extends + broadcasts Tx-B)</text>
  </g>

  <g>
    <rect x="990" y="1490" width="330" height="100" rx="6" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="1010" y="1510" class="step-text-bold lane-chain">No third party</text>
    <text x="1010" y="1528" class="key-text">2-of-2 vault, no oracle, no custodian.</text>
    <text x="1010" y="1548" class="step-text-bold lane-chain">No off-chain channel</text>
    <text x="1010" y="1566" class="key-text">Chain (multimap) is the entire data bus.</text>
  </g>
</svg>
